<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control Secreto | Saith Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { dark: '#080c14', card: '#0f1626', border: '#1e293b', accent: '#8b5cf6' } } } } }
    </script>
</head>
<body class="bg-[#080c14] text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-[#0f1626] border border-purple-500/30 rounded-2xl p-6 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-cyan-500 via-purple-500 to-amber-500"></div>
        
        <div class="flex items-center gap-2 mb-6">
            <i class="fa-solid fa-user-shield text-purple-400 text-xl"></i>
            <h1 class="text-lg font-black tracking-wider uppercase text-purple-300">Consola de Administrador Saith Store</h1>
        </div>

        <form id="account-form" onsubmit="addAccount(event)" class="space-y-4">
            <div>
                <label class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Título de la Publicación</label>
                <input type="text" id="acc-title" required class="w-full bg-[#080c14] border border-slate-800 focus:border-purple-500 rounded-xl p-2.5 text-sm text-white outline-none transition" placeholder="Ej: AR 56 | Furina C2 + Clorinde">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Juego</label>
                    <select id="acc-game" class="w-full bg-[#080c14] border border-slate-800 focus:border-purple-500 rounded-xl p-2.5 text-sm text-white outline-none transition">
                        <option value="genshin">Genshin Impact</option>
                        <option value="honkai">Honkai: Star Rail</option>
                        <option value="wuwa">Wuthering Waves</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Servidor</label>
                    <select id="acc-server" class="w-full bg-[#080c14] border border-slate-800 focus:border-purple-500 rounded-xl p-2.5 text-sm text-white outline-none transition">
                        <option value="America / NA">America (NA)</option>
                        <option value="Europa / EU">Europa (EU)</option>
                        <option value="Asia / AS">Asia (AS)</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Precio de Venta</label>
                    <input type="text" id="acc-price" required class="w-full bg-[#080c14] border border-slate-800 focus:border-purple-500 rounded-xl p-2.5 text-sm text-white outline-none transition" placeholder="Ej: $35 USD / S/. 130">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Galería (Imágenes)</label>
                    <input type="file" id="acc-images" accept="image/*" required multiple class="w-full bg-[#080c14] border border-slate-800 focus:border-purple-500 rounded-xl p-1.5 text-xs text-slate-400 outline-none transition">
                </div>
            </div>
            <div>
                <label class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Especificaciones Técnicas</label>
                <textarea id="acc-details" rows="3" required class="w-full bg-[#080c14] border border-slate-800 focus:border-purple-500 rounded-xl p-2.5 text-sm text-white outline-none transition resize-none" placeholder="Detalla personajes 5 estrellas, armas, etc."></textarea>
            </div>
            <button type="submit" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white text-xs font-black uppercase tracking-widest py-3 px-6 rounded-xl shadow-lg shadow-purple-900/40 transition-all w-full">
                <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Subir Directo a la Vitrina
            </button>
        </form>
        <div class="mt-4 text-center">
            <button onclick="clearAll()" class="text-xs text-red-400 hover:underline"><i class="fa-solid fa-trash"></i> Resetear/Borrar todo el catálogo</button>
        </div>
    </div>

    <script>
        function addAccount(e) {
            e.preventDefault();
            const title = document.getElementById('acc-title').value;
            const game = document.getElementById('acc-game').value;
            const server = document.getElementById('acc-server').value;
            const price = document.getElementById('acc-price').value;
            const details = document.getElementById('acc-details').value;
            const imageInput = document.getElementById('acc-images');

            if (imageInput.files && imageInput.files.length > 0) {
                const filesArray = Array.from(imageInput.files);
                const base64Images = [];
                let loaded = 0;

                filesArray.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        base64Images.push(event.target.result);
                        loaded++;
                        if (loaded === filesArray.length) {
                            const account = { id: Date.now(), title: title, game: game, server: server, price: price, details: details, images: base64Images };
                            let accounts = JSON.parse(localStorage.getItem('saith_accounts')) || [];
                            accounts.push(account);
                            localStorage.setItem('saith_accounts', JSON.stringify(accounts));
                            document.getElementById('account-form').reset();
                            alert("¡Cuenta agregada con éxito! Revisa tu enlace de GitHub para verla.");
                        }
                    };
                    reader.readAsDataURL(file);
                });
            }
        }
        function clearAll() {
            if(confirm("¿Seguro que quieres borrar todas las cuentas de la vitrina?")) {
                localStorage.removeItem('saith_accounts');
                alert("Vitrina limpia.");
            }
        }
    </script>
</body>
</html>
