<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saith Store - Premium Gaming Agency</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* Estilos generales idénticos a tu diseño oscuro y moderno */
        :root {
            --bg-dark: #0b0c10;
            --card-bg: #15161e;
            --accent-blue: #00d2ff;
            --accent-purple: #8a2be2;
            --text-main: #ffffff;
            --text-muted: #a0a5b5;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header-store {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            border-bottom: 1px solid #1f222e;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-title {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .logo-title span { color: var(--accent-blue); }

        .admin-lock {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 18px;
            padding: 10px;
            border: 1px solid #1f222e;
            border-radius: 8px;
            transition: 0.3s;
        }

        .admin-lock:hover {
            color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .section-title {
            font-size: 28px;
            margin: 40px 0 20px 20px;
            position: relative;
            padding-left: 15px;
        }

        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            height: 70%;
            width: 5px;
            background: linear-gradient(to bottom, var(--accent-blue), var(--accent-purple));
            border-radius: 2px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,210,255,0.15);
        }

        .card-img-container {
            width: 100%;
            height: 180px;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .badge-game {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-delete {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #ff3333;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card-body { padding: 20px; }

        .card-title {
            font-size: 20px;
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0 0 20px 0;
            line-height: 1.4;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-price {
            font-size: 22px;
            font-weight: bold;
            color: var(--accent-blue);
        }

        .card-price span {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: 5px;
        }

        .btn-buy {
            background-color: #11131a;
            color: white;
            border: 1px solid #222633;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-buy:hover {
            background-color: white;
            color: black;
        }

        /* Panel de Control Admin */
        .admin-panel {
            background: #1a1c24;
            border: 1px solid #2a2d3d;
            border-radius: 16px;
            padding: 25px;
            margin: 20px;
            display: none;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        input, select {
            background: #11131a;
            border: 1px solid #2a2d3d;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Botón Flotante Whatsapp */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 100;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="header-store">
        <div class="logo-section">
            <div class="logo-title">SAITH<span>STORE</span></div>
        </div>
        <div class="admin-lock" onclick="toggleAdmin()"><i class="fa-solid fa-lock"></i></div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <h3><i class="fa-solid fa-rocket"></i> Centro de Comandos (Subir Contenido)</h3>
        <div class="admin-grid">
            <select id="itemType">
                <option value="boosting">Servicio de Boosting</option>
                <option value="cuentas">Cuenta de Marketplace</option>
            </select>
            <input type="text" id="itemGame" placeholder="Ej: GENSHIN IMPACT">
            <input type="text" id="itemTitle" placeholder="Título (Ej: Farmeo Ecos)">
            <input type="text" id="itemDesc" placeholder="Descripción corta">
            <input type="text" id="itemPrice" placeholder="Precio (Ej: 10.00)">
            <input type="text" id="itemImg" placeholder="Enlace de la Imagen (URL)">
        </div>
        <button class="btn-add" onclick="addNewItem()">Publicar en la Nube</button>
    </div>

    <div class="section-title">Servicios de Boosting</div>
    <div class="grid-container" id="boostingContainer"></div>

    <div class="section-title">Marketplace de Cuentas</div>
    <div class="grid-container" id="accountsContainer"></div>

    <a href="https://wa.me/51900000000" class="whatsapp-float" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>
        // CONFIGURACIÓN REAL DE FIREBASE EXTRAÍDA DE TU CAPTURA
        const firebaseConfig = {
            apiKey: "AIzaSyDfqojwsNW2VXOmekvzn50yWEdF7JjYs8",
            authDomain: "saithstore.firebaseapp.com",
            databaseURL: "https://saithstore-default-rtdb.firebaseio.com",
            projectId: "saithstore",
            storageBucket: "saithstore.firebasestorage.app",
            messagingSenderId: "981493503038",
            appId: "1:981493503038:web:a28b58a0c3fee0adcead6f"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let isAdmin = false;

        // SERVICIOS PREDETERMINADOS FIJOS (Para que nunca aparezcan vacíos)
        const defaultBoosting = [
            { id: "def_1", juego: "GENSHIN IMPACT", titulo: "Mapas al 100%", desc: "Exploración completa", precio: "10.00", img: "https://images2.alphacoders.com/110/1109233.jpg" },
            { id: "def_2", juego: "HONKAI: STAR RAIL", titulo: "Farmeo 20 Deseos", desc: "Rápido y seguro", precio: "7.00", img: "https://images.alphacoders.com/131/1319323.jpeg" },
            { id: "def_3", juego: "WUTHERING WAVES", titulo: "Farmeo Ecos", desc: "Ecos dorados", precio: "5.00", img: "https://images8.alphacoders.com/136/1360155.jpeg" },
            { id: "def_4", juego: "ARKNIGHTS: ENDFIELD", titulo: "Servicio VIP", desc: "Materiales y farmeo", precio: "15.00", img: "https://images8.alphacoders.com/133/1336041.png" }
        ];

        // ESCUCHAR LA BASE DE DATOS EN TIEMPO REAL (Sincroniza PC y Celular automáticamente)
        database.ref('tienda').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            // 1. Cargar Boosting (Predeterminados + los que subas tú)
            const dbBoosting = data.boosting ? Object.keys(data.boosting).map(key => ({id: key, ...data.boosting[key]})) : [];
            renderCards([...defaultBoosting, ...dbBoosting], 'boostingContainer');

            // 2. Cargar Cuentas del Marketplace
            const dbCuentas = data.cuentas ? Object.keys(data.cuentas).map(key => ({id: key, ...data.cuentas[key]})) : [];
            renderCards(dbCuentas, 'accountsContainer');
        });

        // Dibujar las tarjetas en la pantalla
        function renderCards(items, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            if (items.length === 0 && containerId === 'accountsContainer') {
                container.innerHTML = `<p style="color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 20px;">No hay cuentas disponibles en este momento.</p>`;
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Mostrar botón de borrar solo a administradores y si no es un servicio predeterminado fijo
                const showDelete = isAdmin && !item.id.startsWith('def_') ? 'display: flex' : 'display: none';
                const itemTypePath = containerId === 'boostingContainer' ? 'boosting' : 'cuentas';

                card.innerHTML = `
                    <button class="btn-delete" style="${showDelete}" onclick="deleteItem('${itemTypePath}', '${item.id}')"><i class="fa-solid fa-trash"></i></button>
                    <div class="card-img-container" style="background-image: url('${item.img}')">
                        <span class="badge-game">${item.juego}</span>
                    </div>
                    <div class="card-body">
                        <h4 class="card-title">${item.titulo}</h4>
                        <p class="card-desc">${item.desc}</p>
                        <div class="card-footer">
                            <div class="card-price">$ ${item.precio}<span>USD</span></div>
                            <button class="btn-buy" onclick="sendWhatsApp('${item.titulo}', '${item.precio}')">
                                <i class="fa-solid fa-cart-shopping"></i> Comprar
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Subir nuevos items directamente a Firebase
        function addNewItem() {
            const type = document.getElementById('itemType').value;
            const juego = document.getElementById('itemGame').value.toUpperCase();
            const titulo = document.getElementById('itemTitle').value;
            const desc = document.getElementById('itemDesc').value;
            const precio = document.getElementById('itemPrice').value;
            const img = document.getElementById('itemImg').value || "https://images2.alphacoders.com/110/1109233.jpg";

            if(!juego || !titulo || !precio) {
                alert("Por favor completa los campos principales (Juego, Título y Precio)");
                return;
            }

            const newItem = { juego, titulo, desc, precio, img };

            // Empujar a la base de datos en la nube
            database.ref(`tienda/${type}`).push(newItem)
                .then(() => {
                    alert("¡Publicado con éxito en la nube! Se verá en PC y Celulares al instante.");
                    // Limpiar formulario menos el tipo de juego para ahorrar tiempo
                    document.getElementById('itemTitle').value = '';
                    document.getElementById('itemDesc').value = '';
                    document.getElementById('itemPrice').value = '';
                    document.getElementById('itemImg').value = '';
                })
                .catch(error => alert("Error al subir: " + error.message));
        }

        // Eliminar un item de la nube
        function deleteItem(type, id) {
            if(confirm("¿Seguro que deseas eliminar este artículo de la nube?")) {
                database.ref(`tienda/${type}/${id}`).remove()
                    .then(() => alert("Eliminado correctamente."))
                    .catch(error => alert("Error: " + error.message));
            }
        }

        // Sistema de Login Admin
        function toggleAdmin() {
            if (!isAdmin) {
                const pass = prompt("Introduce la clave de Administrador:");
                if (pass === "jessicajasmin11") {
                    isAdmin = true;
                    document.getElementById('adminPanel').style.display = 'block';
                    alert("¡Modo Administrador activado!");
                } else if(pass !== null) {
                    alert("Clave incorrecta.");
                }
            } else {
                isAdmin = false;
                document.getElementById('adminPanel').style.display = 'none';
                alert("Modo Administrador desactivado.");
            }
            // Forzar actualización visual para mostrar/ocultar botones de borrar
            database.ref('tienda').get().then(snapshot => {
                const data = snapshot.val() || {};
                const dbBoosting = data.boosting ? Object.keys(data.boosting).map(key => ({id: key, ...data.boosting[key]})) : [];
                renderCards([...defaultBoosting, ...dbBoosting], 'boostingContainer');
                const dbCuentas = data.cuentas ? Object.keys(data.cuentas).map(key => ({id: key, ...data.cuentas[key]})) : [];
                renderCards(dbCuentas, 'accountsContainer');
            });
        }

        // Enviar mensaje automático a Whatsapp
        function sendWhatsApp(producto, precio) {
            const telefono = "51900000000"; // Reemplaza con tu número real de WhatsApp
            const mensaje = encodeURIComponent(`¡Hola Saith Store! Estoy interesado en comprar el producto: "${producto}" con un costo de $${precio} USD. Me gustaría recibir más información.`);
            window.open(`https://wa.me/${telefono}?text=${mensaje}`, '_blank');
        }
    </script>
</body>
</html>
