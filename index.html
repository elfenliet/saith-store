<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saith Store | Gaming Boosting & Premium Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: { colors: { brand: { dark: '#02040a', card: '#0d1117', border: '#30363d', accent: '#8b5cf6' } } }
            }
        }
    </script>
    <style>
        body { background-color: #02040a; color: #c9d1d9; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        .glass-panel { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .pro-card { background: linear-gradient(180deg, #0d1117 0%, #161b22 100%); border: 1px solid #21262d; transition: all 0.3s ease; overflow: hidden; }
        .pro-card:hover { transform: translateY(-5px); border-color: #8b5cf6; box-shadow: 0 10px 30px rgba(139, 92, 246, 0.2); }
        .text-gradient { background: linear-gradient(135deg, #06b6d4, #8b5cf6, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #space-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        .swal2-popup { background: #0d1117 !important; border: 1px solid #30363d !important; color: #fff !important; border-radius: 1rem !important; }
        .swal2-title { color: #fff !important; }
        .swal2-input, .swal2-textarea { background: rgba(0,0,0,0.5) !important; border: 1px solid #30363d !important; color: #fff !important; }
        .img-container { height: 160px; width: 100%; overflow: hidden; position: relative; border-bottom: 1px solid #30363d; background-color: #02040a;}
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; opacity: 0.9; }
        .pro-card:hover .img-container img { transform: scale(1.05); opacity: 1; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative antialiased">

    <canvas id="space-canvas"></canvas>

    <header class="sticky top-0 z-50 glass-panel px-6 py-4 flex justify-between items-center border-b border-[#30363d]">
        <div class="flex items-center gap-3">
            <div class="h-10 w-10 rounded-xl bg-gradient-to-tr from-purple-600 to-cyan-400 flex items-center justify-center shadow-lg shadow-purple-500/30">
                <i class="fa-solid fa-bolt text-lg text-white"></i>
            </div>
            <div class="flex flex-col">
                <span class="text-xl font-black tracking-widest text-gradient">SAITH STORE</span>
                <span class="text-[9px] text-slate-400 tracking-widest uppercase font-bold">#saithboost | #saithedit</span>
            </div>
        </div>
        <button onclick="loginAdminPro()" class="text-slate-400 hover:text-white transition-colors">
            <i class="fa-solid fa-lock"></i>
        </button>
    </header>

    <main class="max-w-7xl mx-auto w-full px-4 py-12 flex-1">
        <section id="admin-dashboard" class="hidden mb-16 glass-panel p-6 rounded-2xl border-purple-500/30 border-2 shadow-[0_0_30px_rgba(139,92,246,0.15)]">
            <div class="flex justify-between items-center mb-6 border-b border-[#30363d] pb-4">
                <h2 class="text-xl font-bold text-white"><i class="fa-solid fa-terminal text-purple-400 mr-2"></i>Panel de Control Maestro</h2>
                <div class="flex gap-2">
                    <button onclick="clearDatabase()" class="bg-red-900/40 text-red-400 px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-red-600 hover:text-white transition-all">Borrar Todo</button>
                    <button onclick="logoutAdmin()" class="bg-white/10 text-white px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-white/20 transition-all">Cerrar Sesión</button>
                </div>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-black/40 p-5 rounded-xl border border-[#30363d]">
                    <h3 class="text-sm font-bold text-cyan-400 mb-4"><i class="fa-solid fa-plus-circle mr-2"></i>Añadir Servicio de Boosting</h3>
                    <form id="form-boosting" onsubmit="saveBoosting(event)" class="space-y-3">
                        <select id="bst-game" class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-2 text-xs text-white outline-none focus:border-cyan-500">
                            <option value="Genshin Impact">Genshin Impact</option>
                            <option value="Honkai: Star Rail">Honkai: Star Rail</option>
                            <option value="Wuthering Waves">Wuthering Waves</option>
                            <option value="Arknights: Endfield">Arknights: Endfield</option>
                        </select>
                        <input type="text" id="bst-title" placeholder="Título (Ej: Mapas al 100%)" required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-2 text-xs text-white outline-none focus:border-cyan-500">
                        <input type="text" id="bst-desc" placeholder="Descripción corta (Ej: 10 USD + Fee PayPal)" required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-2 text-xs text-white outline-none focus:border-cyan-500">
                        <input type="number" step="0.01" id="bst-price" placeholder="Precio en Dólares (Ej: 10)" required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-2 text-xs text-white outline-none focus:border-cyan-500">
                        <input type="text" id="bst-img" placeholder="Nombre de imagen (Ej: genshin.jpg)" required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-2 text-xs text-white outline-none focus:border-cyan-500">
                        <button type="submit" class="w-full bg-cyan-600 text-white font-bold py-2.5 rounded-lg text-xs hover:bg-cyan-500 transition-colors uppercase tracking-wider mt-2">Publicar Servicio</button>
                    </form>
                </div>

                <div class="bg-black/40 p-5 rounded-xl border border-[#30363d]">
                    <h3 class="text-sm font-bold text-purple-400 mb-4"><i class="fa-solid fa-plus-circle mr-2"></i>Añadir Cuenta al Catálogo</h3>
                    <form id="form-account" onsubmit="saveAccount(event)" class="space-y-3">
                        <select id="acc-game" class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-2 text-xs text-white outline-none focus:border-purple-500">
                            <option value="Genshin Impact">Genshin Impact</option>
                            <option value="Honkai: Star Rail">Honkai: Star Rail</option>
                            <option value="Wuthering Waves">Wuthering Waves</option>
                            <option value="Arknights: Endfield">Arknights: Endfield</option>
                        </select>
                        <input type="text" id="acc-title" placeholder="Título (Ej: Cuenta AR60, 15 5-Estrellas)" required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-2 text-xs text-white outline-none focus:border-purple-500">
                        <input type="number" step="0.01" id="acc-price" placeholder="Precio en Dólares" required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-2 text-xs text-white outline-none focus:border-purple-500">
                        <textarea id="acc-desc" placeholder="Detalles de la cuenta..." required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-2 text-xs text-white h-16 outline-none focus:border-purple-500"></textarea>
                        <input type="text" id="acc-img" placeholder="Nombre de imagen (Ej: honkai.jpg)" required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-2 text-xs text-white outline-none focus:border-purple-500">
                        <button type="submit" class="w-full bg-purple-600 text-white font-bold py-2.5 rounded-lg text-xs hover:bg-purple-500 transition-colors uppercase tracking-wider mt-2">Publicar Cuenta</button>
                    </form>
                </div>
            </div>
        </section>

        <h2 class="text-2xl font-black text-white mb-6 flex items-center gap-2"><i class="fa-solid fa-bolt text-cyan-400"></i> Servicios de Boosting</h2>
        <div id="services-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6 mb-16">
            </div>

        <h2 class="text-2xl font-black text-white mb-6 flex items-center gap-2"><i class="fa-solid fa-store text-purple-500"></i> Marketplace de Cuentas</h2>
        <div id="accounts-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
            </div>
    </main>

    <a href="https://wa.me/51967128876" target="_blank" class="fixed bottom-6 right-6 h-14 w-14 bg-green-500 rounded-full flex items-center justify-center text-white text-3xl shadow-[0_0_20px_rgba(34,197,94,0.4)] hover:scale-110 transition-transform z-50">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>
        const ADMIN_PASS = "jessicajasmin11";
        const FALLBACK_IMG = "https://images.unsplash.com/photo-1542751371-adc38448a05e?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=60";

        // Animación de Fondo
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=0; i<100; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5, s: Math.random()*0.5 });
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            stars.forEach(st => { ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, Math.PI*2); ctx.fill(); st.y += st.s; if(st.y > canvas.height) st.y = 0; });
            requestAnimationFrame(draw);
        }
        draw();

        function loginAdminPro() {
            Swal.fire({
                title: 'Acceso Restringido',
                input: 'password',
                inputPlaceholder: 'Ingresa la clave maestra',
                showCancelButton: true,
                confirmButtonText: 'Acceder',
                confirmButtonColor: '#8b5cf6',
                background: '#0d1117'
            }).then((result) => {
                if (result.value === ADMIN_PASS) {
                    document.getElementById('admin-dashboard').classList.remove('hidden');
                    Swal.fire({ icon: 'success', title: 'Acceso Concedido', showConfirmButton: false, timer: 1500, background: '#0d1117', color: '#fff' });
                }
            });
        }

        function logoutAdmin() {
            document.getElementById('admin-dashboard').classList.add('hidden');
        }

        function clearDatabase() {
            Swal.fire({
                title: '¿Estás seguro?',
                text: "Se borrarán todos los servicios y cuentas.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Sí, borrar todo',
                background: '#0d1117', color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('saith_boosting');
                    localStorage.removeItem('saith_cuentas');
                    loadData();
                    Swal.fire({title: 'Borrado!', icon: 'success', background: '#0d1117', color: '#fff', timer: 1500, showConfirmButton: false});
                }
            });
        }

        function generateOrderTicket(itemType, title, price) {
            const message = `Hola *Saith Store*, vengo desde la web.\n\n🛍️ *Deseo adquirir:* ${title} (${itemType})\n💵 *Precio:* $${price} USD\n\n📱 *Método de pago:* Yape (Perú)\nPor favor, envíame el QR o número para transferir. #saithboost`;
            window.open(`https://wa.me/51967128876?text=${encodeURIComponent(message)}`, '_blank');
        }

        function loadData() {
            // Leemos los datos directamente de la memoria de tu computadora (Local Storage)
            let dataBoost = JSON.parse(localStorage.getItem('saith_boosting'));
            let dataAcc = JSON.parse(localStorage.getItem('saith_cuentas'));

            // Si está vacío, cargamos tus 4 imágenes por defecto para que no se vea el error "undefined"
            if (!dataBoost || Object.keys(dataBoost).length === 0) {
                dataBoost = {
                    '1': { juego: 'Genshin Impact', titulo: 'Mapas al 100%', desc: 'Exploración completa', precio: '10', imagenUrl: 'genshin.jpg' },
                    '2': { juego: 'Honkai: Star Rail', titulo: 'Farmeo 20 Deseos', desc: 'Rápido y seguro', precio: '7', imagenUrl: 'honkai.jpg' },
                    '3': { juego: 'Wuthering Waves', titulo: 'Farmeo Ecos', desc: 'Ecos dorados', precio: '5', imagenUrl: 'wuwa.jpg' },
                    '4': { juego: 'Arknights: Endfield', titulo: 'Servicio VIP', desc: 'Materiales y farmeo', precio: '15', imagenUrl: 'arknights endfield.jpg' }
                };
                localStorage.setItem('saith_boosting', JSON.stringify(dataBoost));
            }
            if (!dataAcc) dataAcc = {};

            // Renderizar Boosting
            const srvCont = document.getElementById('services-container');
            srvCont.innerHTML = '';
            Object.values(dataBoost).forEach(item => {
                srvCont.innerHTML += `
                    <div class="pro-card rounded-2xl flex flex-col justify-between">
                        <div class="img-container">
                            <img src="${item.imagenUrl}" alt="${item.titulo}" onerror="this.src='${FALLBACK_IMG}'">
                            <span class="absolute top-2 left-2 text-[9px] bg-black/80 border border-white/10 text-white px-2 py-1 rounded font-bold uppercase backdrop-blur-sm shadow-md">${item.juego}</span>
                        </div>
                        <div class="p-4 flex flex-col flex-1 justify-between">
                            <div>
                                <h3 class="text-sm font-bold text-white line-clamp-2">${item.titulo}</h3>
                                <p class="text-xs text-slate-400 mt-1 h-8 overflow-hidden">${item.desc}</p>
                                <p class="text-xl font-black text-cyan-400 mt-2">$${parseFloat(item.precio).toFixed(2)} <span class="text-[10px] text-slate-500 font-normal">USD</span></p>
                            </div>
                            <button onclick="generateOrderTicket('Boosting', '${item.titulo}', '${item.precio}')" class="mt-4 w-full bg-white/5 border border-white/10 hover:border-cyan-500 hover:bg-cyan-900/30 text-cyan-400 font-bold py-2 rounded-xl transition-all text-xs">Solicitar Servicio</button>
                        </div>
                    </div>
                `;
            });

            // Renderizar Cuentas
            const accCont = document.getElementById('accounts-container');
            accCont.innerHTML = '';
            const accKeys = Object.keys(dataAcc);
            
            if(accKeys.length === 0) {
                accCont.innerHTML = `<p class="col-span-full text-slate-500 text-sm py-4">Aún no has publicado ninguna cuenta en el Marketplace.</p>`;
            } else {
                Object.values(dataAcc).forEach(item => {
                    accCont.innerHTML += `
                        <div class="pro-card rounded-2xl flex flex-col justify-between">
                            <div class="img-container">
                                <img src="${item.imagenUrl}" alt="${item.titulo}" onerror="this.src='${FALLBACK_IMG}'">
                                <span class="absolute top-2 left-2 text-[9px] bg-purple-900/80 border border-purple-500/30 text-white px-2 py-1 rounded font-bold uppercase backdrop-blur-sm shadow-md">${item.juego}</span>
                            </div>
                            <div class="p-4 flex flex-col flex-1 justify-between">
                                <div>
                                    <h3 class="text-sm font-bold text-white line-clamp-2">${item.titulo}</h3>
                                    <p class="text-xs text-slate-400 mt-1 h-12 overflow-hidden">${item.desc}</p>
                                    <p class="text-xl font-black text-amber-400 mt-2">$${parseFloat(item.precio).toFixed(2)} <span class="text-[10px] text-slate-500 font-normal">USD</span></p>
                                </div>
                                <button onclick="generateOrderTicket('Cuenta', '${item.titulo}', '${item.precio}')" class="mt-4 w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold py-2 rounded-xl transition-all text-xs shadow-lg">Comprar Cuenta</button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        // GUARDADO LOCAL (Sin depender de conexiones a la nube)
        function saveBoosting(e) {
            e.preventDefault();
            const dataBoost = JSON.parse(localStorage.getItem('saith_boosting')) || {};
            const newId = Date.now().toString(); // Generar ID único
            
            dataBoost[newId] = {
                juego: document.getElementById('bst-game').value,
                titulo: document.getElementById('bst-title').value,
                desc: document.getElementById('bst-desc').value,
                precio: document.getElementById('bst-price').value,
                imagenUrl: document.getElementById('bst-img').value || FALLBACK_IMG
            };
            
            localStorage.setItem('saith_boosting', JSON.stringify(dataBoost));
            Swal.fire({ icon: 'success', title: 'Servicio Guardado', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, background: '#0d1117', color: '#fff' });
            e.target.reset(); 
            loadData();
        }

        function saveAccount(e) {
            e.preventDefault();
            const dataAcc = JSON.parse(localStorage.getItem('saith_cuentas')) || {};
            const newId = Date.now().toString(); // Generar ID único
            
            dataAcc[newId] = {
                juego: document.getElementById('acc-game').value,
                titulo: document.getElementById('acc-title').value,
                precio: document.getElementById('acc-price').value,
                desc: document.getElementById('acc-desc').value,
                imagenUrl: document.getElementById('acc-img').value || FALLBACK_IMG
            };
            
            localStorage.setItem('saith_cuentas', JSON.stringify(dataAcc));
            Swal.fire({ icon: 'success', title: 'Cuenta Publicada', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, background: '#0d1117', color: '#fff' });
            e.target.reset(); 
            loadData();
        }

        // Arrancar la página
        loadData();
    </script>
</body>
</html>
