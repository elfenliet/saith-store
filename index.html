<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #02040a; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="flex justify-between items-center p-6 border-b border-white/10">
        <div class="font-bold text-xl">SAITH STORE</div>
        <div class="flex gap-6 text-sm opacity-70">
            <a href="#">Products</a>
            <a href="#">Status</a>
            <a href="#">Discord</a>
        </div>
        <button class="bg-red-500 px-4 py-2 rounded-lg font-bold">Get Started</button>
    </nav>

    <!-- Hero Section similar a image_b5155a.jpg -->
    <header class="text-center py-24">
        <h1 class="text-6xl font-black mb-6">Your Favorite Store #1</h1>
        <button class="bg-white text-black px-8 py-3 rounded-full font-bold">Catalog</button>
    </header>

    <!-- Grid de Productos similar a image_b5153f.jpg -->
    <section class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-4 gap-6">
        <!-- Ejemplo de tarjeta -->
        <div class="glass-card p-4 rounded-2xl hover:border-red-500 transition">
            <div class="h-40 bg-gray-800 rounded-xl mb-4"></div>
            <h3 class="font-bold">Arknights: Endfield</h3>
            <p class="text-sm opacity-50">3 Products</p>
            <p class="mt-2 font-black">$2.49 +</p>
        </div>
    </section>
</body>
</html>
