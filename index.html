<!-- Barra de Búsqueda y Filtros -->
<div class="max-w-4xl mx-auto px-4 mt-8">
    <input type="text" id="search-bar" onkeyup="updateDisplay()" placeholder="🔍 Buscar por nombre de servicio o cuenta..." 
           class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-sm text-white placeholder-slate-500 mb-4 focus:outline-none focus:border-purple-500">
    
    <div id="filter-container" class="flex flex-wrap gap-2 justify-center mb-8">
        <button onclick="setCategory('all')" class="category-btn bg-purple-600 px-4 py-1 rounded-lg text-xs font-bold text-white">🔥 Ver Todo</button>
        <button onclick="setCategory('Genshin')" class="category-btn bg-white/5 px-4 py-1 rounded-lg text-xs font-bold text-slate-300">Genshin</button>
        <button onclick="setCategory('Star Rail')" class="category-btn bg-white/5 px-4 py-1 rounded-lg text-xs font-bold text-slate-300">Star Rail</button>
        <button onclick="setCategory('WuWa')" class="category-btn bg-white/5 px-4 py-1 rounded-lg text-xs font-bold text-slate-300">WuWa</button>
        <button onclick="setCategory('Endfield')" class="category-btn bg-white/5 px-4 py-1 rounded-lg text-xs font-bold text-slate-300">Endfield</button>
    </div>
</div>

<script>
    let currentCategory = 'all';

    function setCategory(cat) {
        currentCategory = cat;
        // Cambiar estilo de botones
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.classList.toggle('bg-purple-600', btn.innerText.includes(cat) || (cat === 'all' && btn.innerText.includes('Todo')));
        });
        updateDisplay();
    }

    function updateDisplay() {
        const searchTerm = document.getElementById('search-bar').value.toLowerCase();
        const grid = document.getElementById('boosting-grid');
        
        // Filtrar por categoría Y por texto de búsqueda
        const filtered = contentData.filter(item => {
            const matchesCat = (currentCategory === 'all' || item.juego === currentCategory);
            const matchesSearch = item.titulo.toLowerCase().includes(searchTerm);
            return matchesCat && matchesSearch;
        });

        grid.innerHTML = filtered.map(item => `
            <div class="pro-card p-5 rounded-2xl">
                <h3 class="font-bold text-white text-sm">${item.titulo}</h3>
                <p class="text-[10px] text-slate-400 mt-1 mb-3">${item.juego}</p>
                <p class="text-emerald-400 font-bold text-xs mb-4">${item.precio}</p>
                <a href="https://wa.me/51967128876" class="block w-full bg-purple-600 py-2 rounded-lg text-xs font-bold text-center uppercase text-white hover:bg-purple-500">Contratar</a>
            </div>
        `).join('');
    }

    // Llamada inicial
    updateDisplay();
</script>
