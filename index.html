<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saith Store | Gaming Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #030712; color: #f3f4f6; font-family: system-ui, sans-serif; }
        .neon-gradient-text { background: linear-gradient(135deg, #06b6d4 0%, #a855f7 50%, #f59e0b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-header { background: rgba(3, 7, 18, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .premium-card { background: linear-gradient(145deg, #0b0f19 0%, #070a10 100%); border: 1px solid rgba(255, 255, 255, 0.03); transition: all 0.3s ease; }
        @keyframes pulse-gold { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); box-shadow: 0 0 12px rgba(245, 158, 11, 0.5); } }
        .instant-badge { animation: pulse-gold 2s infinite ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="sticky top-0 z-40 glass-header px-4 lg:px-12 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="text-xl font-black tracking-wider neon-gradient-text">SAITH STORE</span>
        </div>
        <!-- Convertidor de Moneda -->
        <div class="bg-white/5 border border-white/10 rounded-xl px-2.5 py-1.5 flex items-center gap-1.5 text-xs text-white font-bold">
            <i class="fa-solid fa-coins text-amber-400"></i>
            <select id="currency-select" onchange="changeCurrency(this.value)" class="bg-transparent text-white outline-none font-bold cursor-pointer">
                <option value="USD" class="bg-slate-950">USD ($)</option>
                <option value="PEN" class="bg-slate-950">PEN (S/.)</option>
            </select>
        </div>
    </header>

    <main class="max-w-7xl mx-auto w-full px-4 my-12 flex-1">
        <div id="marketplace-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center text-slate-500 py-12">Conectando en tiempo real con Saith Store...</div>
        </div>
    </main>

    <script>
        // ⚠️ PEGA AQUÍ LA URL DE TU REALTIME DATABASE DE FIREBASE TRAS EL PASO 1
        const FIREBASE_URL = "CONECTA_AQUÍ_TU_ENLACE_DE_FIREBASE/cuentas.json";

        let selectedCurrency = 'USD';
        const exchangeRates = { USD: 1.0, PEN: 3.78 };
        const currencySymbols = { USD: '$', PEN: 'S/. ' };

        function changeCurrency(currencyCode) {
            selectedCurrency = currencyCode;
            fetchCuentas();
        }

        function formatPrice(originalPrice) {
            const num = parseFloat(originalPrice.toString().replace(/[^0-9.]/g, ''));
            if (isNaN(num)) return originalPrice;
            return `${currencySymbols[selectedCurrency]}${(num * exchangeRates[selectedCurrency]).toFixed(2)}`;
        }

        async function fetchCuentas() {
            try {
                const response = await fetch(FIREBASE_URL);
                const data = await response.json();
                const container = document.getElementById('marketplace-grid');
                container.innerHTML = '';

                if (!data) {
                    container.innerHTML = `<div class="col-span-full text-center text-slate-500 py-12">No hay cuentas activas en este momento.</div>`;
                    return;
                }

                Object.keys(data).forEach(key => {
                    const acc = data[key];
                    const finalPrice = formatPrice(acc.precio);
                    const badgeInstant = acc.entrega === 'si' ? `<span class="instant-badge absolute top-3 right-3 bg-gradient-to-r from-amber-500 to-orange-500 text-black text-[9px] font-black px-2 py-0.5 rounded uppercase">⚡ Entrega Inmediata</span>` : '';
                    const waMessage = encodeURIComponent(`Hola Saith Store, quiero comprar:\n📌 *Cuenta:* ${acc.titulo}\n💵 *Precio:* ${finalPrice}`);

                    container.innerHTML += `
                        <div class="premium-card rounded-2xl overflow-hidden p-3.5 flex flex-col justify-between relative border border-white/5">
                            <div>
                                <div class="relative h-48 rounded-xl overflow-hidden mb-3 bg-slate-950">
                                    <img src="${acc.imagenUrl}" class="w-full h-full object-cover">
                                    <span class="absolute top-3 left-3 bg-purple-950 border border-purple-500 text-purple-400 text-[9px] font-black px-2 py-0.5 rounded uppercase">${acc.juego}</span>
                                    ${badgeInstant}
                                </div>
                                <h5 class="text-sm font-bold text-slate-100 line-clamp-2">${acc.titulo}</h5>
                                <div class="flex gap-2 my-2 items-center">
                                    <span class="text-xs font-black text-emerald-400 bg-emerald-950/50 border border-emerald-500/30 px-2 py-0.5 rounded">${finalPrice}</span>
                                    <span class="text-[9px] font-black text-indigo-300 bg-indigo-950/50 border border-indigo-500/20 px-2 py-0.5 rounded uppercase">${acc.servidor}</span>
                                </div>
                                <p class="text-xs text-slate-400 bg-black/30 rounded-xl p-3 line-clamp-3 whitespace-pre-line">${acc.detalles}</p>
                            </div>
                            <a href="https://wa.me/51967128876?text=${waMessage}" target="_blank" class="mt-4 w-full bg-gradient-to-r from-emerald-600 to-teal-600 text-white text-center font-black text-xs py-3 rounded-xl flex items-center justify-center gap-2 uppercase"><i class="fa-solid fa-bag-shopping"></i> Comprar Ahora</a>
                        </div>`;
                });
            } catch (error) {
                console.error("Error cargando base de datos:", error);
            }
        }
        document.addEventListener('DOMContentLoaded', fetchCuentas);
    </script>
</body>
</html>
