<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saith Store | Gaming Boosting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #02040a; color: #c9d1d9; }
        .glass { background: rgba(13, 17, 23, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
        .pro-card { background: #0d1117; border: 1px solid #21262d; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto text-center mb-12">
        <h1 class="text-4xl font-black text-white">SAITH STORE</h1>
        <p class="text-slate-500">#SAITHBOOST | #SAITHEDIT</p>
    </div>

    <main class="max-w-7xl mx-auto">
        <h2 class="text-white font-bold mb-6 flex items-center gap-2"><i class="fa-solid fa-bolt text-cyan-400"></i> Servicios de Boosting</h2>
        <div id="boosting-grid" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-12">
            <p class="text-slate-600">Cargando servicios...</p>
        </div>

        <h2 class="text-white font-bold mb-6 flex items-center gap-2"><i class="fa-solid fa-store text-purple-500"></i> Cuentas Disponibles</h2>
        <div id="marketplace-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <p class="text-slate-600">Cargando catálogo...</p>
        </div>
    </main>

    <script>
        const WHATSAPP = "51967128876";
        const BASE_URL = "https://saithstore-default-rtdb.firebaseio.com/";

        async function init() {
            try {
                const res = await fetch(`${BASE_URL}boosting.json`);
                const data = await res.json();
                
                const bGrid = document.getElementById('boosting-grid');
                bGrid.innerHTML = ''; // Limpiar mensaje de carga

                if (!data) {
                    bGrid.innerHTML = '<p class="text-red-500">No hay servicios configurados.</p>';
                    return;
                }

                Object.values(data).forEach(item => {
                    bGrid.innerHTML += `
                        <div class="pro-card p-4 rounded-xl">
                            <h3 class="text-white font-bold text-sm">${item.tituloEs}</h3>
                            <p class="text-[10px] text-slate-400 my-2">${item.descEs || 'Consultar'}</p>
                            <p class="text-emerald-400 font-bold text-xs mb-3">${item.precio > 0 ? item.precio + ' USD' : 'Consultar'}</p>
                            <a href="https://wa.me/${WHATSAPP}?text=Hola, quiero contratar: ${item.tituloEs}" target="_blank" 
                               class="block w-full bg-purple-600 text-white text-[10px] font-bold py-2 rounded-lg text-center uppercase">Contratar</a>
                        </div>
                    `;
                });
            } catch (e) {
                console.error("Error al cargar:", e);
            }
        }
        init();
    </script>
</body>
</html>
